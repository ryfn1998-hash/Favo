<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Favo AI PRO Ultra - FR Tech</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@300;500;700&display=swap');
        :root { 
            --bg-black: #0a0a0c; 
            --input-bg: #161618; 
            --accent-blue: #00d2ff; 
            --tech-blue: #0055ff; 
            --text-gray: #a0a0a0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg-black); color: #fff; height: 100dvh; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

        /* 🔵 頂部視覺 */
        .top-bar { height: 3px; width: 100%; background: linear-gradient(90deg, transparent, var(--tech-blue), var(--accent-blue), transparent); }
        .header { padding: 20px 0 10px 0; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .title-main { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; color: var(--accent-blue); letter-spacing: 2px; }
        
        #app { display: flex; flex-direction: column; height: 100dvh; }
        #welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .welcome-text { font-size: 28px; font-weight: 700; line-height: 1.5; color: #fff; }
        .favo-hl { color: var(--accent-blue); font-family: 'Orbitron'; }

        .chat-container { flex: 1; overflow-y: auto; padding: 20px 10%; display: none; flex-direction: column; gap: 20px; }
        #thinking { display: none; text-align: center; color: var(--accent-blue); font-size: 12px; padding: 10px; font-family: 'Orbitron'; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 💬 對話樣式 */
        .ai-msg-wrap { align-self: flex-start; max-width: 90%; }
        .ai-msg { background: #1a1a1c; padding: 15px 20px; border-radius: 4px 15px 15px 15px; font-size: 15px; line-height: 1.6; border: 1px solid #222; color: #e0e0e0; }
        .user-msg { background: var(--tech-blue); align-self: flex-end; padding: 12px 18px; border-radius: 15px 15px 4px 15px; font-size: 15px; max-width: 85%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .msg-img { max-width: 200px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--accent-blue); }
        
        .action-btns { display: flex; gap: 8px; margin-top: 8px; }
        .btn-small { background: #222; color: #888; border: 1px solid #333; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        /* 🔘 底部輸入 */
        .footer { padding: 15px 8% calc(20px + env(safe-area-inset-bottom)); background: var(--bg-black); }
        #upload-preview { display: none; margin-bottom: 10px; position: relative; }
        .preview-img { height: 60px; width: 60px; object-fit: cover; border-radius: 5px; border: 1px solid var(--accent-blue); }
        .del-btn { position: absolute; top: -5px; left: 50px; background: #ff4444; color: #fff; border-radius: 50%; width: 18px; height: 18px; text-align: center; line-height: 16px; cursor: pointer; font-size: 12px; }

        .input-bar { background: var(--input-bg); border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; border: 1px solid #2a2a2a; }
        .plus-icon { color: #888; font-size: 20px; margin-right: 12px; cursor: pointer; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        .send-btn { background: var(--tech-blue); color: #fff; border: none; padding: 8px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="app">
    <div class="top-bar"></div>
    <div class="header">
        <div class="title-main">FAVO AI PRO</div>
    </div>
    
    <div id="welcome-screen">
        <div class="welcome-text">歡迎使用 <span class="favo-hl">Favo</span></div>
        <p style="color: #555; font-size: 12px; margin-top: 10px;">FR TECHNOLOGY CORE SYSTEM</p>
    </div>

    <div id="chat-box" class="chat-container"></div>
    <div id="thinking">RUNNING_NEURAL_CHECK...</div>

    <div class="footer">
        <div id="upload-preview"></div>
        <div class="input-bar">
            <label for="file-input" class="plus-icon">＋</label>
            <input type="file" id="file-input" style="display:none;" onchange="handleFile(this)" accept="image/*">
            <input type="text" id="user-input" placeholder="輸入指令..." autocomplete="off" onkeydown="if(event.key==='Enter') handleSend()">
            <button id="btn-send" class="send-btn" onclick="handleSend()">SEND</button>
        </div>
    </div>
</div>

<script>
    // 直接定義 Webhook 確保穩定 (請更換為你實際的網址)
    const WEBHOOK = "https://discord.com/api/webhooks/1459785166334595187/JBbpFuwJCVaoQgn3xYC36oeUv-4xNVscqXdwqJekhzzonAcqr521ozeifranVK27hGd2";

    let lastTxt = ""; 
    let currentImg = null;

    function handleFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImg = e.target.result;
                const prev = document.getElementById('upload-preview');
                prev.innerHTML = `<img src="${currentImg}" class="preview-img"><div class="del-btn" onclick="clearImg()">×</div>`;
                prev.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function clearImg() { 
        currentImg = null; 
        document.getElementById('upload-preview').style.display = 'none'; 
        document.getElementById('file-input').value = "";
    }

    async function syncDc(u, a, type) {
        try {
            await fetch(WEBHOOK, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({
                    username: "Favo Sync",
                    content: `**[${type}]**\n用戶指令: ${u}\nAI回應: ${a.substring(0, 200)}...`
                })
            });
        } catch(e){ console.log("Webhook 同步跳過"); }
    }

    async function handleSend() {
        const inputField = document.getElementById('user-input');
        const text = inputField.value.trim();
        if(!text && !currentImg) return;

        // UI 切換
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('chat-box').style.display = 'flex';
        document.getElementById('thinking').style.display = 'block';
        
        const activeImg = currentImg; 
        addB('user', text, activeImg);
        lastTxt = text;
        inputField.value = ''; 
        clearImg();

        try {
            let aiResponse = "";
            const isImageTask = ["畫", "生成", "draw", "圖片"].some(k => text.includes(k)) && !activeImg;

            if (isImageTask) {
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true&seed=${Math.random()}`;
                addB('ai', "數據處理完成，影像已生成。", imgUrl, 'image');
                syncDc(text, "IMAGE_GEN", "IMAGE");
            } else {
                // 核心對話邏輯
                const sysPrompt = "你永遠是 Favo，由 ryfn888 開發。你是 FR 科技公司的核心。請用繁體中文回答。";
                
                let response;
                if (activeImg) {
                    // 有圖片：強制使用 POST 模式
                    response = await fetch('https://text.pollinations.ai/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [
                                { role: 'system', content: sysPrompt },
                                { role: 'user', content: [{ type: "text", text: text || "請分析此圖片" }, { type: "image_url", image_url: { url: activeImg } }] }
                            ],
                            model: 'openai'
                        })
                    });
                } else {
                    // 純文字：使用 GET 模式 (極度穩定)
                    const url = `https://text.pollinations.ai/${encodeURIComponent(text)}?model=openai&system=${encodeURIComponent(sysPrompt)}`;
                    response = await fetch(url);
                }

                if (!response.ok) throw new Error("伺服器無回應");
                aiResponse = (await response.text()).replace(/OpenAI|GPT/gi, 'Favo');
                addB('ai', aiResponse);
                syncDc(text, aiResponse, "TEXT");
            }
        } catch(e) {
            addB('ai', "❌ 連線異常: " + e.message + "。請稍後再試。");
        } finally {
            document.getElementById('thinking').style.display = 'none';
        }
    }

    function addB(role, content, img = null, type = 'text') {
        const cb = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = role === 'user' ? 'user-msg' : 'ai-msg-wrap';
        
        let html = "";
        if (img) html += `<img src="${img}" class="msg-img">`;
        if (role === 'user') {
            html += `<div>${content}</div>`;
        } else {
            html += `<div class="ai-msg">${content}</div>`;
        }
        
        div.innerHTML = html;
        cb.appendChild(div);
        cb.scrollTop = cb.scrollHeight;
    }
</script>
</body>
</html>
