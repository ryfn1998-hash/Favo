<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FAVO AI - 維護中</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@500;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #08080a; font-family: 'Noto Sans TC', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 背景霓虹光暈 */
        .bg-glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0, 114, 255, 0.2) 0%, transparent 70%);
            filter: blur(50px); z-index: 0;
        }

        /* 維修視窗主體 */
        #maintenance-overlay {
            position: relative; z-index: 10;
            width: 85%; max-width: 450px;
            background: rgba(18, 18, 20, 0.95);
            border: 1px solid #00f2ff;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(20px);
            animation: fadeIn 0.8s ease-out;
        }

        .alert-icon {
            font-size: 50px; margin-bottom: 20px; display: block;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: #00f2ff; font-size: 22px; margin-bottom: 25px;
            letter-spacing: 1px; line-height: 1.5;
        }

        .info-box {
            background: rgba(0, 114, 255, 0.1);
            border-radius: 12px; padding: 15px; margin-bottom: 30px;
            color: #ddd; font-size: 15px; line-height: 1.8;
            border: 1px dashed rgba(0, 242, 255, 0.3);
        }

        .dc-btn {
            display: inline-block;
            background: #5865F2; color: #fff;
            text-decoration: none; padding: 14px 25px;
            border-radius: 10px; font-weight: 700;
            font-size: 16px; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }

        .dc-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
            background: #4752c4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-glow"></div>

    <div id="maintenance-overlay">
        <span class="alert-icon">⚠️</span>
        <h2>2026.3/29 1:03<br>FAVO 正在維修 暫停使用</h2>
        
        <div class="info-box">
            由於系統架構全面升級至 2.0 版本，<br>
            FAVO 1 目前已停止服務。<br>
            最新進度與使用詳情請至下方頻道：
        </div>

        <a href="https://discord.gg/mns2Ra4Yt2" class="dc-btn" target="_blank">
            進入 Discord 官方頻道
        </a>
    </div>

</body>
</html>
